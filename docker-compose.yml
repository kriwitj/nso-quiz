
services:
  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: quiz_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-quizdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Port 5432 exposed only on localhost for admin tools (e.g. pgAdmin, psql)
    # Change to '5433:5432' if port 5432 is already used on the host
    ports:
      - '127.0.0.1:5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ─── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: quiz_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - '127.0.0.1:6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ─── MinIO (S3-compatible storage) ───────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: quiz_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - '127.0.0.1:9000:9000'   # S3 API
      - '127.0.0.1:9001:9001'   # Web console
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ─── MinIO bucket initializer ─────────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: quiz_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin};
        mc mb --ignore-existing local/${MINIO_BUCKET:-quiz-assets};
        mc anonymous set download local/${MINIO_BUCKET:-quiz-assets};
        echo 'MinIO bucket ready';
      "
    networks:
      - internal

  # ─── NestJS API ───────────────────────────────────────────────────────────────
  api:
    build:
      context: .   # monorepo root — Dockerfile needs package-lock.json + packages/shared
      dockerfile: ./apps/api/Dockerfile
    container_name: quiz_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-quizdb}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-change-me-super-secret-jwt-key-32chars}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-secret}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-https://province-stat.nso.go.th/nso-quiz/api/auth/google/callback}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-quiz-assets}
      MINIO_USE_SSL: 'false'
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9000}
      FRONTEND_URL: ${FRONTEND_URL:-https://province-stat.nso.go.th}
    # Port not exposed to host — Traefik routes traffic internally via proxy_net
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4000/api/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - internal
      - proxy_net
    labels:
      - "traefik.enable=true"
      # ── Router: /nso-quiz/api/* → API (priority 20, strip /nso-quiz prefix) ──
      - "traefik.http.routers.quiz-api.rule=Host(`province-stat.nso.go.th`) && PathPrefix(`${BASE_PATH:-/nso-quiz}/api`)"
      - "traefik.http.routers.quiz-api.priority=20"
      - "traefik.http.routers.quiz-api.entrypoints=websecure"
      - "traefik.http.routers.quiz-api.tls=true"
      - "traefik.http.routers.quiz-api.service=quiz-api"
      - "traefik.http.routers.quiz-api.middlewares=quiz-strip-basepath"
      # ── Router: /nso-quiz/socket.io (WebSocket, priority 25) ─────────────────
      - "traefik.http.routers.quiz-ws.rule=Host(`province-stat.nso.go.th`) && PathPrefix(`${BASE_PATH:-/nso-quiz}/socket.io`)"
      - "traefik.http.routers.quiz-ws.priority=25"
      - "traefik.http.routers.quiz-ws.entrypoints=websecure"
      - "traefik.http.routers.quiz-ws.tls=true"
      - "traefik.http.routers.quiz-ws.service=quiz-api"
      - "traefik.http.routers.quiz-ws.middlewares=quiz-strip-basepath"
      # ── Shared StripPrefix middleware (removes /nso-quiz before forwarding) ───
      - "traefik.http.middlewares.quiz-strip-basepath.stripprefix.prefixes=${BASE_PATH:-/nso-quiz}"
      # ── Service ──────────────────────────────────────────────────────────────
      - "traefik.http.services.quiz-api.loadbalancer.server.port=4000"

  # ─── Next.js Web App ──────────────────────────────────────────────────────────
  web:
    build:
      context: .   # monorepo root — Dockerfile needs package-lock.json + packages/shared
      dockerfile: ./apps/web/Dockerfile
      args:
        # NEXT_PUBLIC_* and BASE_PATH are baked into the JS bundle at build time
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://province-stat.nso.go.th/nso-quiz/api}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-https://province-stat.nso.go.th}
        BASE_PATH: ${BASE_PATH:-/nso-quiz}
        NEXT_PUBLIC_BASE_PATH: ${BASE_PATH:-/nso-quiz}
    container_name: quiz_web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      # NEXTAUTH_URL must include the full base path for NextAuth redirects to work
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://province-stat.nso.go.th/nso-quiz}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-nextauth-secret}
      # Server-side internal API URL (no basePath needed — direct container-to-container)
      API_URL: http://api:4000/api
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://province-stat.nso.go.th/nso-quiz/api}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-https://province-stat.nso.go.th}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    # Port not exposed to host — Traefik routes traffic internally via proxy_net
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000${BASE_PATH:-/nso-quiz} || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - internal
      - proxy_net
    labels:
      - "traefik.enable=true"
      # ── Router: /nso-quiz/api/auth/* → Web/NextAuth (highest priority = 30) ──
      # NextAuth lives inside Next.js, not NestJS, so this rule wins over quiz-api
      - "traefik.http.routers.quiz-web-auth.rule=Host(`province-stat.nso.go.th`) && PathPrefix(`${BASE_PATH:-/nso-quiz}/api/auth`)"
      - "traefik.http.routers.quiz-web-auth.priority=30"
      - "traefik.http.routers.quiz-web-auth.entrypoints=websecure"
      - "traefik.http.routers.quiz-web-auth.tls=true"
      - "traefik.http.routers.quiz-web-auth.service=quiz-web"
      # ── Router: /nso-quiz/* → Web (lowest priority = 10, NO StripPrefix) ─────
      # Next.js is built with basePath=/nso-quiz so it serves /nso-quiz/* natively
      - "traefik.http.routers.quiz-web.rule=Host(`province-stat.nso.go.th`) && PathPrefix(`${BASE_PATH:-/nso-quiz}`)"
      - "traefik.http.routers.quiz-web.priority=10"
      - "traefik.http.routers.quiz-web.entrypoints=websecure"
      - "traefik.http.routers.quiz-web.tls=true"
      - "traefik.http.routers.quiz-web.service=quiz-web"
      # ── Service ──────────────────────────────────────────────────────────────
      - "traefik.http.services.quiz-web.loadbalancer.server.port=3000"

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  # Internal network — containers talk to each other; not reachable from outside
  internal:
    name: quiz_network

  # External Traefik network — must already exist on the host
  # Create once with: docker network create proxy_net
  proxy_net:
    external: true
